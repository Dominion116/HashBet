services:
  - type: web
    name: hashbet-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CHAIN_ID
        value: "11142220"
      - key: CONTRACT_ADDRESS
        sync: false
      - key: RPC_URL
        sync: false
