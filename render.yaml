services:
  - type: web
    name: hashbet-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://hashbetcelo.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CELO_CHAIN_ID
        value: "11142220"
      - key: CONTRACT_ADDRESS
        sync: false
      - key: CELO_RPC_URL
        sync: false
